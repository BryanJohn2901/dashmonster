<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Monster Hub — tráfego e vendas no mesmo lugar">
  <defs>
    <!-- fundo -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0E07"/>
      <stop offset="0.55" stop-color="#0E1108"/>
      <stop offset="1" stop-color="#101408"/>
    </linearGradient>
    <!-- aurora animada -->
    <radialGradient id="glowLime" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 120) scale(420 260)">
      <stop stop-color="#B6F500" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#B6F500" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 300) scale(460 280)">
      <stop stop-color="#16A34A" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#16A34A" stop-opacity="0"/>
    </radialGradient>
    <!-- shimmer do título -->
    <linearGradient id="shine" x1="-300" y1="0" x2="0" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAFFF2" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#EAFFF2" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#EAFFF2" stop-opacity="0"/>
      <animate attributeName="x1" values="-300;1500" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;1800" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>
    <style>
      .t { font-family: 'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1200" height="400" rx="16" fill="url(#bg)"/>

  <!-- grade sutil -->
  <g stroke="#B6F500" stroke-opacity="0.05">
    <path d="M0 100h1200M0 200h1200M0 300h1200"/>
    <path d="M150 0v400M300 0v400M450 0v400M600 0v400M750 0v400M900 0v400M1050 0v400"/>
  </g>

  <rect width="1200" height="400" rx="16" fill="url(#glowLime)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 120 40; 0 0" dur="9s" repeatCount="indefinite"/>
  </rect>
  <rect width="1200" height="400" rx="16" fill="url(#glowGreen)">
    <animateTransform attributeName="transform" type="translate" values="0 0; -140 -50; 0 0" dur="11s" repeatCount="indefinite"/>
  </rect>

  <!-- moldura -->
  <rect x="0.5" y="0.5" width="1199" height="399" rx="15.5" stroke="#B6F500" stroke-opacity="0.22"/>

  <!-- selo -->
  <g class="t">
    <rect x="470" y="66" width="260" height="30" rx="15" fill="#B6F500" fill-opacity="0.08" stroke="#B6F500" stroke-opacity="0.35"/>
    <circle cx="492" cy="81" r="4" fill="#B6F500">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="506" y="86" font-size="13" letter-spacing="3" fill="#B6F500">PLATAFORMA MULTI-EMPRESA</text>
  </g>

  <!-- título -->
  <g class="t" text-anchor="middle">
    <text x="600" y="188" font-size="84" font-weight="800" letter-spacing="-2" fill="#F2FFF8">MONSTER&#160;HUB</text>
    <text x="600" y="188" font-size="84" font-weight="800" letter-spacing="-2" fill="url(#shine)">MONSTER&#160;HUB</text>
    <text x="600" y="230" font-size="21" fill="#9DA38C">Tráfego pago e vendas no mesmo lugar — do anúncio ao ROAS real.</text>
  </g>

  <!-- chips de produto -->
  <g class="t" text-anchor="middle" font-size="15" font-weight="700">
    <g>
      <rect x="285" y="278" width="200" height="44" rx="22" fill="#16A34A" fill-opacity="0.12" stroke="#16A34A" stroke-opacity="0.5"/>
      <text x="385" y="306" fill="#4ADE80">🐉&#160; DashMonster</text>
    </g>
    <g>
      <rect x="505" y="278" width="190" height="44" rx="22" fill="#B6F500" fill-opacity="0.10" stroke="#B6F500" stroke-opacity="0.5"/>
      <text x="600" y="306" fill="#B6F500">⚡&#160; PipeFlow</text>
    </g>
    <g>
      <rect x="715" y="278" width="200" height="44" rx="22" fill="#EAFFF2" fill-opacity="0.06" stroke="#EAFFF2" stroke-opacity="0.3"/>
      <text x="815" y="306" fill="#D5DCC9">🛡️&#160; Painel Admin</text>
    </g>
  </g>

  <!-- legenda dos chips -->
  <g class="t" text-anchor="middle" font-size="11.5" fill="#6E7560">
    <text x="385" y="342">Analytics · Meta Ads</text>
    <text x="600" y="342">CRM · Social Selling</text>
    <text x="815" y="342">Empresas · Acessos</text>
  </g>
</svg>
